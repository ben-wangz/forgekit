name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: test -z "$(gofmt -l ./cmd ./internal)"

      - name: Verify forgekit self version resolution
        run: go run ./cmd/forgekit version get forgekit

      - name: Run forgekit lint
        run: go run ./cmd/forgekit lint

      - name: Build
        run: go build ./...
