name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Read VERSION from repository
        run: |
          echo "FORGEKIT_VERSION=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_ENV"

      - name: Validate tag matches VERSION
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#v}"
          if [ "$FORGEKIT_VERSION" != "$TAG_VERSION" ]; then
            echo "VERSION mismatch: VERSION=$FORGEKIT_VERSION, tag=$TAG_NAME"
            exit 1
          fi

      - name: Build multi-platform binaries
        env:
          VERSION: ${{ env.FORGEKIT_VERSION }}
          COMMIT: ${{ github.sha }}
        run: |
          mkdir -p dist
          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
          )

          for target in "${targets[@]}"; do
            IFS=' ' read -r goos goarch <<< "$target"
            output="dist/forgekit_${goos}_${goarch}"
            echo "Building ${output}"

            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath \
              -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT}" \
              -o "$output" ./cmd/forgekit
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
